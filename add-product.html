<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product | Inventor App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="add">
  <div class="app-shell">
    <header class="sub-hero">
      <div>
        <p class="eyebrow">Add Product</p>
        <h1>New Product Entry</h1>
        <p class="hero-copy">Create a complete product record with warranty, multiple photos, pricing, and sales details.</p>
      </div>
      <nav class="top-nav">
        <a href="index.html">Home</a>
        <a href="purchase-bill.html">Purchase Bill</a>
        <a href="inventory.html">View Inventory</a>
        <a href="update-product.html">Update Product</a>
      </nav>
    </header>

    <main class="page-stack">
      <section class="panel">
        <div class="panel-heading">
          <h2>Add Product</h2>
          <p>Upload multiple photos or add image URLs separated by new lines.</p>
        </div>

        <form id="productForm" class="product-form">
          <label>
            Product name
            <input type="text" name="name" required placeholder="Wireless Mouse">
          </label>

          <label>
            SKU / Code
            <input type="text" name="sku" placeholder="WM-1001">
          </label>

          <label>
            Category
            <input type="text" name="category" placeholder="Electronics">
          </label>

          <label>
            Brand
            <input type="text" name="brand" placeholder="LogiTech">
          </label>

          <label>
            Purchase date
            <input type="date" name="purchaseDate">
          </label>

          <label>
            Sale date
            <input type="date" name="saleDate">
          </label>

          <label>
            Warranty
            <input type="text" name="warranty" placeholder="12 months">
          </label>

          <label>
            Quantity
            <input type="number" name="quantity" min="0" step="1" placeholder="1">
          </label>

          <label>
            MRP
            <input type="number" name="mrp" min="0" step="0.01" placeholder="0.00">
          </label>

          <label>
            Discount %
            <input type="number" name="discount" min="0" max="100" step="0.01" placeholder="0">
          </label>

          <label>
            Selling price
            <input type="number" name="sellingPrice" min="0" step="0.01" placeholder="0.00">
          </label>

          <label>
            Cost price
            <input type="number" name="costPrice" min="0" step="0.01" placeholder="0.00">
          </label>

          <label class="full-span">
            Photo URLs
            <textarea name="photoUrls" rows="3" placeholder="https://example.com/photo1.jpg&#10;https://example.com/photo2.jpg"></textarea>
          </label>

          <label class="full-span">
            Upload photos
            <input id="addPhotosInput" type="file" accept="image/*" multiple>
          </label>

          <label class="full-span">
            Notes
            <textarea name="notes" rows="4" placeholder="Color, supplier, size, batch, remarks..."></textarea>
          </label>

          <div class="full-span form-actions">
            <button type="submit" class="primary">Save product</button>
            <button type="reset" class="ghost">Clear</button>
          </div>
        </form>

        <p id="formMessage" class="status-banner"></p>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
